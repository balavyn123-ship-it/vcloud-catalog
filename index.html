<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VclouD - Каталог</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-text">VclouD</span>
            </a>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Пошук товарів...">
                <button class="search-btn">🔍</button>
            </div>
            
            <nav class="nav">
                <a href="#" class="nav-link active" data-cat="all">Всі</a>
                <a href="#" class="nav-link" data-cat="clothing">Одяг</a>
                <a href="#" class="nav-link" data-cat="electronics">Техніка</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main main-no-sidebar">
        <div class="container">
            <!-- Products Grid -->
            <section class="products-section full-width">
                <div class="products-header">
                    <h2>Каталог <span id="productsCount"></span></h2>
                    <select id="sortSelect" class="sort-select">
                        <option value="newest">Найновіші</option>
                        <option value="price-asc">Ціна ↑</option>
                        <option value="price-desc">Ціна ↓</option>
                        <option value="name">За назвою</option>
                    </select>
                </div>
                
                <div class="products-grid" id="productsGrid">
                    <!-- Товари завантажуються динамічно -->
                </div>
                
                <div class="load-more" id="loadMore">
                    <button class="btn-load-more" onclick="loadMore()">Завантажити ще</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 VclouD</p>
            <div class="footer-links">
                <a href="#">Telegram</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
